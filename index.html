<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="color-scheme" content="dark light"/>
<title>Swing House — Pilotage</title>
<link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/swinghousechx/BASELOGO/refs/heads/main/SH-Icone%20Balle%20%2B%20tee%20noir.svg"/>
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/swinghousechx/BASELOGO/refs/heads/main/SH-Icone%20Balle%20%2B%20tee%20noir.svg"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── Palette OKLCH — dark par défaut, light si préférence système ─── */
:root{
  --bg:           oklch(0.155 0.005 250);
  --surface:      oklch(0.195 0.005 250);
  --surface-2:    oklch(0.225 0.006 250);
  --hairline:     oklch(0.265 0.006 250);
  --hairline-2:   oklch(0.32 0.006 250);

  --ink:          oklch(0.97 0.005 250);
  --ink-2:        oklch(0.82 0.006 250);
  --ink-muted:    oklch(0.62 0.008 250);
  --ink-whisper:  oklch(0.48 0.008 250);

  --primary:      oklch(0.66 0.14 152);
  --primary-soft: oklch(0.40 0.08 152);
  --accent:       oklch(0.72 0.14 75);
  --danger:       oklch(0.68 0.18 30);
  --info:         oklch(0.70 0.12 235);

  --primary-tint: color-mix(in oklch, var(--primary) 14%, transparent);
  --danger-tint:  color-mix(in oklch, var(--danger)  14%, transparent);
  --accent-tint:  color-mix(in oklch, var(--accent)  14%, transparent);

  --radius: 8px;
  --chart-h: 240px;
}
@media (prefers-color-scheme: light){
  :root{
    --bg:           oklch(0.985 0.003 250);
    --surface:      oklch(1 0 0);
    --surface-2:    oklch(0.965 0.003 250);
    --hairline:     oklch(0.91 0.005 250);
    --hairline-2:   oklch(0.84 0.006 250);

    --ink:          oklch(0.18 0.008 250);
    --ink-2:        oklch(0.32 0.008 250);
    --ink-muted:    oklch(0.50 0.008 250);
    --ink-whisper:  oklch(0.62 0.008 250);

    --primary:      oklch(0.48 0.14 152);
    --primary-soft: oklch(0.70 0.10 152);
    --accent:       oklch(0.58 0.14 75);
    --danger:       oklch(0.52 0.20 28);
    --info:         oklch(0.55 0.14 235);
  }
}
/* override manuel via data-theme sur <html> (toggle utilisateur) */
:root[data-theme="dark"]{
  --bg:           oklch(0.155 0.005 250);
  --surface:      oklch(0.195 0.005 250);
  --surface-2:    oklch(0.225 0.006 250);
  --hairline:     oklch(0.265 0.006 250);
  --hairline-2:   oklch(0.32 0.006 250);
  --ink:          oklch(0.97 0.005 250);
  --ink-2:        oklch(0.82 0.006 250);
  --ink-muted:    oklch(0.62 0.008 250);
  --ink-whisper:  oklch(0.48 0.008 250);
  --primary:      oklch(0.66 0.14 152);
  --primary-soft: oklch(0.40 0.08 152);
  --accent:       oklch(0.72 0.14 75);
  --danger:       oklch(0.68 0.18 30);
  --info:         oklch(0.70 0.12 235);
}
:root[data-theme="light"]{
  --bg:           oklch(0.985 0.003 250);
  --surface:      oklch(1 0 0);
  --surface-2:    oklch(0.965 0.003 250);
  --hairline:     oklch(0.91 0.005 250);
  --hairline-2:   oklch(0.84 0.006 250);
  --ink:          oklch(0.18 0.008 250);
  --ink-2:        oklch(0.32 0.008 250);
  --ink-muted:    oklch(0.50 0.008 250);
  --ink-whisper:  oklch(0.62 0.008 250);
  --primary:      oklch(0.48 0.14 152);
  --primary-soft: oklch(0.70 0.10 152);
  --accent:       oklch(0.58 0.14 75);
  --danger:       oklch(0.52 0.20 28);
  --info:         oklch(0.55 0.14 235);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);}
body{
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  color:var(--ink);
  font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
input,select,button,textarea{font-family:inherit;font-variant-numeric:tabular-nums;}
.sh-num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em;}

/* Scrollbars discrètes alignées sur la hairline */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--hairline-2);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--ink-muted);}
*{scrollbar-width:thin;scrollbar-color:var(--hairline-2) transparent;}

/* ─── Topbar ─── */
.sh-topbar{
  position:sticky;top:0;z-index:20;
  background:color-mix(in oklch, var(--bg) 90%, transparent);
  backdrop-filter:saturate(180%) blur(8px);
  -webkit-backdrop-filter:saturate(180%) blur(8px);
  border-bottom:1px solid var(--hairline);
  padding:0.75rem clamp(0.85rem, 2vw, 1.5rem);
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.sh-scroll-progress{
  position:absolute;left:0;bottom:-1px;height:2px;
  background:linear-gradient(90deg,var(--primary),var(--accent));
  width:0;transition:width 60ms linear;pointer-events:none;
  border-radius:0 2px 2px 0;
}
.sh-brand{display:flex;align-items:center;gap:0.75rem;min-width:0;}
.sh-brand-mark{display:flex;align-items:center;gap:0.5rem;}
.sh-dot{
  width:7px;height:7px;border-radius:50%;background:var(--primary);
  box-shadow:0 0 0 0 var(--primary-tint);
  animation:shPulse 2.2s ease-in-out infinite;
}
@keyframes shPulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 var(--primary-tint);}
  50%{opacity:.55;box-shadow:0 0 0 8px transparent;}
}
.sh-brand-text{font-size:0.86rem;font-weight:600;color:var(--ink);letter-spacing:-0.01em;}
.sh-brand-sub{font-size:0.78rem;color:var(--ink-muted);font-weight:400;}
.sh-logo{color:var(--ink);fill:currentColor;width:auto;flex-shrink:0;}
.sh-logo *{fill:currentColor;}
@media (max-width:600px){.sh-logo{height:22px;}}
.sh-meta{display:flex;align-items:center;gap:0.85rem;flex-wrap:wrap;}

/* ─── Nav tabs ─── */
.sh-nav{
  display:flex;gap:2px;overflow-x:auto;padding:0.5rem clamp(0.85rem, 2vw, 1.5rem);
  border-bottom:1px solid var(--hairline);
  background:var(--bg);
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.sh-nav::-webkit-scrollbar{display:none;}
.sh-tab{
  flex-shrink:0;
  font-size:0.82rem;font-weight:500;color:var(--ink-muted);
  background:transparent;border:1px solid transparent;
  padding:0.45rem 0.85rem;border-radius:7px;
  cursor:pointer;outline:none;
  transition:color 150ms ease, background 150ms ease, border-color 150ms ease;
  min-height:38px;display:inline-flex;align-items:center;
}
.sh-tab:hover{color:var(--ink-2);background:var(--surface);}
.sh-tab[data-active="true"]{
  color:var(--primary);background:var(--surface);
  border-color:var(--hairline);font-weight:600;
}
.sh-tab:focus-visible{outline:2px solid var(--primary-tint);outline-offset:2px;}
.sh-tab:active{transform:scale(0.98);}

/* ─── Buttons (refresh, blur, theme) ─── */
.sh-btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  background:var(--surface-2);
  border:1px solid var(--hairline-2);
  color:var(--ink-2);
  font-size:0.78rem;font-weight:500;
  padding:0.4rem 0.75rem;border-radius:var(--radius);
  cursor:pointer;outline:none;min-height:36px;
  transition:border-color 150ms ease, color 150ms ease, background 150ms ease;
}
.sh-btn:hover{border-color:var(--primary);color:var(--primary);}
.sh-btn:focus-visible{outline:2px solid var(--primary-tint);outline-offset:2px;}
.sh-btn:active{transform:scale(0.97);}
.sh-btn:disabled{cursor:wait;opacity:.65;}
.sh-btn[data-state="error"]{border-color:var(--danger);color:var(--danger);}
.sh-btn[data-active="true"]{background:var(--primary);color:var(--bg);border-color:var(--primary);}
.sh-btn .sh-icon{width:14px;height:14px;display:inline-block;}
.sh-btn .sh-icon-refresh{transition:transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);}
.sh-btn:hover .sh-icon-refresh{transform:rotate(-180deg);}

/* ─── Range slider unified across browsers ─── */
input[type=range]{
  -webkit-appearance:none;appearance:none;
  background:transparent;cursor:pointer;height:24px;
}
input[type=range]::-webkit-slider-runnable-track{
  height:4px;border-radius:2px;background:var(--hairline-2);
}
input[type=range]::-moz-range-track{
  height:4px;border-radius:2px;background:var(--hairline-2);
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--primary);border:2px solid var(--bg);
  margin-top:-5px;cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:var(--primary);border:2px solid var(--bg);cursor:pointer;
}

/* ─── Select ─── */
.sh-select{
  background:var(--surface);color:var(--ink);
  border:1px solid var(--hairline);border-radius:var(--radius);
  padding:0.5rem 0.75rem;
  font-size:16px; /* iOS pas de zoom au focus */
  font-weight:500;cursor:pointer;outline:none;
  transition:border-color 150ms ease;
}
.sh-select:hover{border-color:var(--hairline-2);}
.sh-select:focus-visible{border-color:var(--primary);outline:2px solid var(--primary-tint);outline-offset:1px;}

/* ─── Cards / panels ─── */
.sh-card{
  background:var(--surface);
  border:1px solid var(--hairline);
  border-radius:var(--radius);
  padding:clamp(0.85rem, 2vw, 1.25rem);
  transition:border-color 150ms ease;
}
.sh-card:hover{border-color:var(--hairline-2);}
.sh-section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:0.85rem;gap:0.5rem;flex-wrap:wrap;
}
.sh-h2{
  font-size:clamp(0.88rem, 2.2vw, 0.95rem);
  font-weight:600;color:var(--ink);letter-spacing:-0.005em;
}
.sh-meta-r{font-size:0.72rem;color:var(--ink-whisper);}
.sh-label{font-size:0.72rem;font-weight:500;color:var(--ink-muted);}
.sh-value{
  font-size:clamp(1.35rem, 4.5vw, 1.6rem);font-weight:600;color:var(--ink);
  letter-spacing:-0.02em;font-variant-numeric:tabular-nums;
}
.sh-value-lg{
  font-size:clamp(1.6rem, 6vw, 2rem);font-weight:600;color:var(--ink);
  letter-spacing:-0.025em;font-variant-numeric:tabular-nums;
}
.sh-sub{font-size:0.72rem;color:var(--ink-whisper);}

.sh-pill{
  display:inline-flex;align-items:center;gap:0.25rem;
  padding:2px 7px;border-radius:99px;
  font-size:0.7rem;font-weight:600;font-variant-numeric:tabular-nums;
  border:1px solid transparent;
  white-space:nowrap;flex-shrink:0;line-height:1;
}
.sh-pill-pos{background:var(--primary-tint);color:var(--primary);border-color:color-mix(in oklch,var(--primary) 30%, transparent);}
.sh-pill-neg{background:var(--danger-tint);color:var(--danger);border-color:color-mix(in oklch,var(--danger) 30%, transparent);}
.sh-pill-neu{background:var(--surface-2);color:var(--ink-muted);border-color:var(--hairline);}

/* ─── Grids ─── */
.sh-grid{display:grid;gap:clamp(0.6rem, 1.5vw, 0.85rem);}
.sh-grid-kpi{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
.sh-grid-3{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));}
.sh-grid-2col{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
.sh-grid-5{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));}
.sh-grid-7{grid-template-columns:repeat(7,1fr);}
@media (max-width:600px){
  .sh-grid-7{grid-template-columns:repeat(4,1fr);}
}
@media (max-width:380px){
  .sh-grid-7{grid-template-columns:repeat(3,1fr);}
  .sh-grid-kpi{grid-template-columns:repeat(2,1fr);}
}

/* ─── Tables ─── */
.sh-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sh-table{width:100%;border-collapse:collapse;min-width:480px;}
.sh-table th{
  text-align:left;font-size:0.7rem;font-weight:500;
  color:var(--ink-muted);letter-spacing:0.02em;text-transform:none;
  padding:0.5rem 0.7rem;border-bottom:1px solid var(--hairline);
}
.sh-table td{
  padding:0.7rem;font-size:0.84rem;color:var(--ink-2);
  border-bottom:1px solid var(--hairline);
}
.sh-table tr:hover td{background:var(--surface-2);}
.sh-table .num{text-align:right;font-variant-numeric:tabular-nums;}

/* ─── Layout ─── */
.sh-main{
  max-width:1180px;margin:0 auto;
  padding:clamp(1rem, 3vw, 2rem) clamp(0.85rem, 2vw, 1.5rem);
}
.sh-stack{display:flex;flex-direction:column;gap:clamp(0.85rem, 2vw, 1.25rem);}

.sh-alert{
  display:flex;align-items:center;gap:0.85rem;
  padding:0.85rem 1rem;border-radius:var(--radius);
  border:1px solid var(--hairline);background:var(--surface);
}
.sh-alert[data-tone="pos"]{border-color:color-mix(in oklch,var(--primary) 40%, transparent);background:var(--primary-tint);}
.sh-alert[data-tone="neu"]{border-color:color-mix(in oklch,var(--accent) 40%, transparent);background:var(--accent-tint);}
.sh-alert[data-tone="neg"]{border-color:color-mix(in oklch,var(--danger) 40%, transparent);background:var(--danger-tint);}

/* ─── Toast ─── */
.sh-toast-wrap{
  position:fixed;bottom:clamp(0.75rem,2vw,1.5rem);right:clamp(0.75rem,2vw,1.5rem);
  display:flex;flex-direction:column;gap:0.5rem;z-index:50;
  max-width:min(380px,calc(100vw - 1.5rem));pointer-events:none;
}
.sh-toast{
  display:flex;align-items:flex-start;gap:0.6rem;
  background:var(--surface);border:1px solid var(--hairline);
  border-left:3px solid var(--danger);
  border-radius:var(--radius);padding:0.7rem 0.85rem;
  box-shadow:0 10px 30px -8px rgba(0,0,0,0.25);
  font-size:0.82rem;color:var(--ink);
  pointer-events:auto;animation:shToastIn 220ms cubic-bezier(0.34,1.56,0.64,1);
}
.sh-toast[data-tone="warn"]{border-left-color:var(--accent);}
.sh-toast[data-tone="info"]{border-left-color:var(--info);}
.sh-toast-body{flex:1;min-width:0;}
.sh-toast-title{font-weight:600;margin-bottom:2px;}
.sh-toast-msg{color:var(--ink-muted);font-size:0.74rem;line-height:1.45;word-break:break-word;}
.sh-toast-close{
  background:transparent;border:none;color:var(--ink-muted);cursor:pointer;
  width:22px;height:22px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:14px;line-height:1;padding:0;
}
.sh-toast-close:hover{color:var(--ink);background:var(--surface-2);}
@keyframes shToastIn{from{opacity:0;transform:translateY(8px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}

/* ─── Fresh data badge ─── */
.sh-fresh{
  display:inline-flex;align-items:center;gap:5px;
}
.sh-fresh-dot{
  width:6px;height:6px;border-radius:50%;background:var(--ink-muted);
  flex-shrink:0;
}
.sh-fresh[data-age="fresh"] .sh-fresh-dot{
  background:var(--primary);
  box-shadow:0 0 0 0 var(--primary-tint);
  animation:shFreshPulse 2.2s ease-in-out infinite;
}
.sh-fresh[data-age="stale"] .sh-fresh-dot{background:var(--accent);}
.sh-fresh[data-age="old"] .sh-fresh-dot{background:var(--danger);}
.sh-fresh[data-age="fresh"] .sh-fresh-time{color:var(--ink-2);}
.sh-fresh[data-age="stale"] .sh-fresh-time{color:var(--accent);}
.sh-fresh[data-age="old"] .sh-fresh-time{color:var(--danger);}
@keyframes shFreshPulse{
  0%,100%{box-shadow:0 0 0 0 var(--primary-tint);}
  50%{box-shadow:0 0 0 5px transparent;}
}

/* ─── Skeleton loaders ─── */
.sh-skel{
  background:linear-gradient(90deg,var(--surface-2) 0%,var(--hairline-2) 50%,var(--surface-2) 100%);
  background-size:200% 100%;border-radius:6px;
  animation:shSkel 1.4s ease-in-out infinite;display:block;
}
@keyframes shSkel{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.sh-skel-line{height:0.85em;margin:0.4em 0;}
.sh-skel-w-30{width:30%;}.sh-skel-w-50{width:50%;}.sh-skel-w-70{width:70%;}.sh-skel-w-90{width:90%;}
.sh-skel-block{height:60px;}
@media (prefers-reduced-motion:reduce){.sh-skel,.sh-fresh-dot{animation:none!important;}}

/* ─── Footer ─── */
.sh-footer{
  max-width:1180px;margin:2rem auto 0;
  padding:1rem clamp(0.85rem, 2vw, 1.5rem) 2rem;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;
  font-size:0.72rem;color:var(--ink-whisper);
  border-top:1px solid var(--hairline);
}
.sh-footer .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:0.68rem;}

/* ─── Mobile ─── */
@media (max-width:600px){
  .sh-topbar{flex-direction:column;align-items:stretch;gap:0.6rem;padding:0.6rem 0.85rem;}
  .sh-topbar .sh-brand{justify-content:space-between;}
  .sh-meta{justify-content:space-between;}
  .sh-meta .sh-date{display:none;}
  .sh-meta .sh-sep{display:none;}
}

/* ─── Motion safety ─── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms!important;animation-iteration-count:1!important;
    transition-duration:0.01ms!important;scroll-behavior:auto!important;
  }
  .sh-dot{animation:none;}
}

/* ─── Recharts surcharges minimes (couleurs gérées via JS palette) ─── */
.recharts-tooltip-wrapper{outline:none;}
.recharts-default-tooltip{
  background:var(--surface)!important;
  border:1px solid var(--hairline)!important;
  border-radius:var(--radius)!important;
  color:var(--ink)!important;
  font-family:'DM Sans',system-ui,sans-serif!important;
  padding:0.5rem 0.75rem!important;
}
.recharts-tooltip-label{color:var(--ink)!important;font-weight:600!important;}
.recharts-text{fill:var(--ink-muted);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
ResponsiveContainer, LineChart, Line, ComposedChart, Area,
ScatterChart, Scatter, LabelList, ReferenceLine } = Recharts;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYNmL4HpimT0sPeIVMnpg_QYjzteULoFo4azYni0mn9N6o5joy8x-SOZFLyiMp11sU/exec";
const LAT = 45.923, LON = 6.869;
const font = "'DM Sans', system-ui, sans-serif";

// ── PALETTE — résolue depuis les CSS variables et rafraîchie au switch thème ──
function resolvePalette(){
  const cs = getComputedStyle(document.documentElement);
  const v = name => cs.getPropertyValue(name).trim();
  return {
    bg:        v('--bg'),
    card:      v('--surface'),
    card2:     v('--surface-2'),
    border:    v('--hairline'),
    border2:   v('--hairline-2'),
    txt:       v('--ink'),
    txt2:      v('--ink-2'),
    txt3:      v('--ink-muted'),
    whisper:   v('--ink-whisper'),
    green:     v('--primary'),
    primarySoft: v('--primary-soft'),
    red:       v('--danger'),
    accent:    v('--accent'),
    rain:      v('--info'),
    snow:      v('--ink-muted'),
    chartCur:  v('--primary'),
    chartPrev: v('--hairline-2'),
    chartMuted:v('--hairline'),
    chartObj:  v('--accent'),
  };
}
// T est muté in place : les références closure dans le JSX continuent de pointer

function parseDailyCa(rows) {
  const result = {};
  if (!Array.isArray(rows)) return result;
  rows.forEach(function(row) {
    const raw = row[1];
    if (!raw) return;
    const d = new Date(raw);
    if (isNaN(d.getTime())) return;
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dayIdx = d.getDate() - 1;
    if (dayIdx < 0 || dayIdx > 30) return;
    const v = row[10];
    const val = typeof v === "number" ? v : parseFloat(String(v ?? "").replace(",", ".")) || 0;
    if (!result[mm]) result[mm] = new Array(31).fill(null);
    result[mm][dayIdx] = val;
  });
  return result;
}

function parseH(v) {
  if (v == null) return 0;
  if (typeof v === "number") return v;
  const s = String(v);
  if (/T\d{2}:\d{2}/.test(s)) return 0;
  return parseFloat(s.replace(",", ".")) || 0;
}

function parseSimuRows(rows) {
  const result = [];
  if (!Array.isArray(rows)) return result;
  const MONTH_LABELS = {"01":"Jan","02":"Fév","03":"Mar","04":"Avr","05":"Mai","06":"Jun",
    "07":"Jul","08":"Aoû","09":"Sep","10":"Oct","11":"Nov","12":"Déc"};
  rows.forEach(function(row) {
    const raw = row[0];
    if (!raw) return;
    const d = new Date(raw);
    if (isNaN(d.getTime())) return;
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const b1 = parseH(row[1]);
    const b2 = parseH(row[2]);
    const b3 = parseH(row[3]);
    result.push({d: dd + "/" + mm, b1: b1, b2: b2, b3: b3});
  });
  if (result.length > 0) {
    const months = [...new Set(result.map(r => r.d.split("/")[1]))].sort();
    Object.keys(SIMU_M_LABELS).forEach(k => delete SIMU_M_LABELS[k]);
    months.forEach(function(mm) { if (MONTH_LABELS[mm]) SIMU_M_LABELS[mm] = MONTH_LABELS[mm]; });
  }
  return result;
}

function pearson(xs,ys){const n=xs.length;if(n<3)return 0;const mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;const num=xs.reduce((a,x,i)=>a+(x-mx)*(ys[i]-my),0);const den=Math.sqrt(xs.reduce((a,x)=>a+(x-mx)**2,0)*ys.reduce((a,y)=>a+(y-my)**2,0));return den?(num/den):0;}
function estimateCA(rain,pairs){if(!pairs.length)return null;const n=pairs.length,mx=pairs.reduce((a,p)=>a+p.x,0)/n,my=pairs.reduce((a,p)=>a+p.y,0)/n;const b=pairs.reduce((a,p)=>a+(p.x-mx)*(p.y-my),0)/Math.max(pairs.reduce((a,p)=>a+(p.x-mx)**2,0),1);return Math.max(0,Math.round((my-b*mx)+b*rain));}
function probaObj(rain,obj,pairs){if(!pairs.length||!obj)return null;const pool=pairs.filter(p=>Math.abs(p.x-rain)<=3);const p=pool.length>=5?pool:pairs;return Math.round(p.filter(x=>x.y>=obj).length/p.length*100);}

function parseSheetRows(rows) {
const result = {};
if (!Array.isArray(rows)) return result;
rows.forEach(row => {
for (let c = 0; c < Math.min(row.length, 4); c++) {
const cell = String(row[c] ?? "").toUpperCase().replace(/\s+/g," ").trim();
if (!cell.includes("TOTAL")) continue;
let mIdx = -1;
Object.entries(MONTH_MAP).forEach(([k,v]) => { if(cell.includes(k)) mIdx = v; });
if (mIdx === -1) continue;
for (let i = 8; i < row.length; i++) {
const raw = String(row[i] ?? "").replace(/\s/g,"").replace(",",".");
const val = parseFloat(raw.replace(/[^\d.-]/g,""));
if (val > 0 && !isNaN(val)) { result[MONTHS[mIdx]] = val; break; }
}
break;
}
});
return result;
}

// Somme rolling sur N derniers jours pour une source DJ (DJ_N ou DJ_N1)
function sumLastNDays(dj,today,n){
  let total=0;
  for(let i=0;i<n;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const mm=String(d.getMonth()+1).padStart(2,"0");
    const idx=d.getDate()-1;
    total += (dj[mm]||[])[idx] || 0;
  }
  return total;
}
const PERIOD_LABELS={month:"Mois en cours","7d":"7 derniers jours","30d":"30 derniers jours",ytd:"YTD"};

const caN1MemeStade=(DJ_N1[mm]||[]).slice(0,joursEcoules).reduce((a,v)=>a+(v||0),0);

const objAnnuel=MONTHS.reduce((a,m)=>a+(ca_n1[m]?Math.round(ca_n1[m]*(1+growth/100)):0),0);

else if(period==="ytd"){ periodN=totalN; periodN1=totalN1S; }
else { const n=period==="7d"?7:30; periodN=sumLastNDays(DJ_N,today,n); periodN1=sumLastNDays(DJ_N1,today,n); }
const pairs=useMemo(()=>{
const p=[];
Object.entries(DJ_N1).forEach(([mm,arr])=>{const wx=wxDaily[`n1-${mm}`]||[];(arr||[]).forEach((ca,i)=>{if(wx[i]&&ca>0)p.push({x:+(wx[i].rain||0).toFixed(1),y:ca});});});

const isSnow=c=>c!=null&&((c>=71&&c<=77)||(c===85||c===86));
const isRain=c=>c!=null&&!isSnow(c)&&c>=51;

return p;
},[wxDaily]);
const snowPairs=useMemo(()=>{
const p=[];
Object.entries(DJ_N1).forEach(([mm,arr])=>{const wx=wxDaily[`n1-${mm}`]||[];(arr||[]).forEach((ca,i)=>{if(wx[i]&&ca>0&&isSnow(wx[i].code))p.push({x:+(wx[i].snow||0).toFixed(1),y:ca});});});
Object.entries(DJ_N).forEach(([mm,arr])=>{const wx=wxDaily[mm]||[];(arr||[]).forEach((ca,i)=>{if(wx[i]&&ca>0&&isSnow(wx[i].code))p.push({x:+(wx[i].snow||0).toFixed(1),y:ca});});});
return p;
},[wxDaily]);
const pairs=useMemo(()=>[...rainPairs,...snowPairs],[rainPairs,snowPairs]);
const rRain=pearson(rainPairs.map(p=>p.x),rainPairs.map(p=>p.y));
const rSnow=pearson(snowPairs.map(p=>p.x),snowPairs.map(p=>p.y));

// ─── Précision du modèle : prédit chaque jour 2026 à partir des paires 2025 uniquement ──
const accuracy=useMemo(()=>{
  // Paires de référence : uniquement DJ_N1 (pour éviter la fuite de données quand on prédit DJ_N)
  const refPairs=[];
  Object.entries(DJ_N1).forEach(([mm,arr])=>{const w=wxDaily[`n1-${mm}`]||[];(arr||[]).forEach((ca,i)=>{if(w[i]&&ca>0)refPairs.push({x:+(w[i].rain||0).toFixed(1),y:ca});});});
  if(refPairs.length<10) return null;
  const errs=[],apes=[],series=[];
  Object.entries(DJ_N).forEach(([mm,arr])=>{
    const w=wxDaily[mm]||[];
    (arr||[]).forEach((ca,i)=>{
      if(ca==null||ca<=0||!w[i])return;
      const pred=estimateCA(+(w[i].rain||0).toFixed(1),refPairs);
      if(pred==null)return;
      const err=Math.abs(pred-ca);
      errs.push(err);
      apes.push(err/ca);
      series.push({d:`${String(i+1).padStart(2,"0")}/${mm}`,pred,actual:ca});
    });
  });
  if(!errs.length) return null;
  const mae=Math.round(errs.reduce((a,b)=>a+b,0)/errs.length);
  const mape=Math.round(apes.reduce((a,b)=>a+b,0)/apes.length*100);
  // bias = signe moyen pred-actual (sur ou sous-estimation systématique)
  const bias=Math.round(series.reduce((a,r)=>a+(r.pred-r.actual),0)/series.length);
  return {n:errs.length,mae,mape,bias,series:series.slice(-30)};

return res;

};

function VueSimu(){
  const [selM,setSelM]=useState("all");
  const mLabels=Object.values(SIMU_M_LABELS);
  const filtered=selM==="all"?SIMU_DATA:(()=>{
    const mm=Object.keys(SIMU_M_LABELS).find(k=>SIMU_M_LABELS[k]===selM);
    return SIMU_DATA.filter(r=>r.d.endsWith("/"+mm));
  })();
  const totals={
    b1:+SIMU_DATA.reduce((a,r)=>a+r.b1,0).toFixed(1),
    b2:+SIMU_DATA.reduce((a,r)=>a+r.b2,0).toFixed(1),
    b3:+SIMU_DATA.reduce((a,r)=>a+r.b3,0).toFixed(1),
  };
  const grandTotal=+(totals.b1+totals.b2+totals.b3).toFixed(1);
  const topIdx=[totals.b1,totals.b2,totals.b3].indexOf(Math.max(totals.b1,totals.b2,totals.b3));
  const monthly=mLabels.map(ml=>{
    const mm=Object.keys(SIMU_M_LABELS).find(k=>SIMU_M_LABELS[k]===ml);
    const rows=SIMU_DATA.filter(r=>r.d.endsWith("/"+mm));
    const b1=+rows.reduce((a,r)=>a+r.b1,0).toFixed(1);
    const b2=+rows.reduce((a,r)=>a+r.b2,0).toFixed(1);
    const b3=+rows.reduce((a,r)=>a+r.b3,0).toFixed(1);
    return {m:ml,"Bay 1":b1,"Bay 2":b2,"Bay 3":b3,total:+(b1+b2+b3).toFixed(1)};
  });
  const filteredTotal=+filtered.reduce((a,r)=>a+r.b1+r.b2+r.b3,0).toFixed(1);
  const avgJour=filtered.length?+(filteredTotal/filtered.length).toFixed(1):0;
  const avgMois=mLabels.length?+(grandTotal/mLabels.length).toFixed(1):0;
  const avgJourAll=SIMU_DATA.length?+(grandTotal/SIMU_DATA.length).toFixed(1):0;
  const dayData=filtered.map(r=>({j:r.d,"Bay 1":r.b1,"Bay 2":r.b2,"Bay 3":r.b3}));
  const C=[T.chartCur,T.accent,T.rain];
  const bayLabels=["Bay 1","Bay 2","Bay 3"];
  return <div className="sh-stack">
    <div className="sh-grid sh-grid-kpi">
      {[totals.b1,totals.b2,totals.b3].map((h,i)=>{
        const share=grandTotal>0?Math.round(h/grandTotal*100):0;
        return <Card key={i} style={{position:"relative"}}>
          {i===topIdx&&<span className="sh-pill sh-pill-pos" style={{position:"absolute",top:12,right:12}}>Top</span>}
          <div className="sh-label" style={{marginBottom:6}}>{bayLabels[i]}</div>
          <div className="sh-value" style={{marginBottom:4}}>{h}<span style={{fontSize:14,color:T.whisper,marginLeft:2}}>h</span></div>
          <div className="sh-sub" style={{marginBottom:10}}>{share}% du total</div>
          <div style={{height:4,background:T.card2,borderRadius:2,overflow:"hidden"}}>
            <div style={{width:`${share}%`,height:"100%",background:C[i],borderRadius:2}}/>
          </div>
        </Card>;
      })}
      <Card style={{background:T.card2}}>
        <div className="sh-label" style={{marginBottom:6}}>Σ Total</div>
        <div className="sh-value-lg" style={{marginBottom:10}}>{grandTotal}<span style={{fontSize:14,color:T.whisper,marginLeft:2}}>h</span></div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {[["YTD",grandTotal+"h"],["Moy./mois",avgMois+"h"],["Moy./jour",avgJourAll+"h"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
              <span style={{color:T.whisper}}>{l}</span>
              <span style={{fontWeight:600,color:T.txt,fontVariantNumeric:"tabular-nums"}}>{v}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
    <Card>
      <div className="sh-section-head"><div className="sh-h2">Heures par bay · agrégat mensuel</div></div>
      <ResponsiveContainer width="100%" height={260}>
        <BarChart data={monthly} barCategoryGap="30%" margin={{top:18,right:4,left:-10,bottom:0}}>
          <CartesianGrid stroke={T.border} vertical={false}/>
          <XAxis dataKey="m" tick={{fontSize:11,fontFamily:font,fill:T.txt3}} axisLine={false} tickLine={false}/>
          <YAxis tickFormatter={v=>v+"h"} tick={{fontSize:10,fontFamily:font,fill:T.txt3}} axisLine={false} tickLine={false}/>
          <Tooltip content={<SimuTooltip/>} cursor={{fill:T.card2}}/>
          <Legend wrapperStyle={{fontFamily:font,fontSize:11,paddingTop:8,color:T.txt2}} iconSize={8} iconType="square"/>
          <Bar dataKey="Bay 1" stackId="s" fill={C[0]}/>
          <Bar dataKey="Bay 2" stackId="s" fill={C[1]}/>
          <Bar dataKey="Bay 3" stackId="s" fill={C[2]} radius={[3,3,0,0]}>
            <LabelList dataKey="total" position="top" style={{fontSize:10,fontWeight:700,fill:T.txt,fontFamily:font}} formatter={v=>v+"h"}/>
          </Bar>
        </BarChart>
      </ResponsiveContainer>
    </Card>
    <Card>
      <div className="sh-section-head">
        <div className="sh-h2">Détail journalier</div>
        <div className="sh-meta-r">
          Total période <span style={{fontWeight:700,color:T.txt}}>{filteredTotal}h</span>
          <span style={{marginLeft:8}}>{filtered.length}j · moy. {avgJour}h/j</span>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {["all",...mLabels].map(m=><button key={m} onClick={()=>setSelM(m)} className="sh-tab" data-active={selM===m?"true":"false"}>{m==="all"?"Tout":m}</button>)}
      </div>
      <ResponsiveContainer width="100%" height={260}>
        <BarChart data={dayData} barCategoryGap="12%" margin={{top:4,right:4,left:-10,bottom:0}}>
          <CartesianGrid stroke={T.border} vertical={false}/>
          <XAxis dataKey="j" tick={{fontSize:selM==="all"?8:10,fontFamily:font,fill:T.txt3}} axisLine={false} tickLine={false} interval={selM==="all"?4:0}/>
          <YAxis tickFormatter={v=>v+"h"} tick={{fontSize:10,fontFamily:font,fill:T.txt3}} axisLine={false} tickLine={false}/>
          <Tooltip content={<SimuTooltip/>} cursor={{fill:T.card2}}/>
          <Legend wrapperStyle={{fontFamily:font,fontSize:11,paddingTop:8,color:T.txt2}} iconSize={8} iconType="square"/>
          <ReferenceLine y={8} stroke={T.red} strokeDasharray="4 3" strokeWidth={1.5} label={{value:"obj. 8h",position:"right",fontSize:10,fill:T.red,fontFamily:font}}/>
          <Bar dataKey="Bay 1" stackId="s" fill={C[0]}/>
          <Bar dataKey="Bay 2" stackId="s" fill={C[1]}/>
          <Bar dataKey="Bay 3" stackId="s" fill={C[2]} radius={[2,2,0,0]}/>
        </BarChart>
      </ResponsiveContainer>
    </Card>
  </div>;
}

function VueMembership(){

<div className="sh-label" style={{marginBottom:6}}>ARPU</div>
<div className="sh-value">{fmt(arpu)}</div>

function App(){
const [vue,setVue]=useState("jour");
const [ca_n,setCaN]=useState(CA_N_STATIC);
const [ca_n1,setCaN1]=useState(CA_N1_STATIC);
const [growth,setGrowth]=useState(40);
const [blurred,setBlurred]=useState(false);
const [wxToday,setWxToday]=useState(null);
const [wxForecast,setWxForecast]=useState([]);
const [wxHist,setWxHist]=useState(null);
const [wxDaily,setWxDaily]=useState({});
const [lastSync,setLastSync]=useState(null);
const [syncing,setSyncing]=useState(false);
const [syncStatus,setSyncStatus]=useState("");
const [theme,setTheme]=useState(()=>localStorage.getItem("sh_theme")||"auto"); // auto|dark|light
const [period,setPeriod]=useState(()=>localStorage.getItem("sh_period")||"month"); // month|7d|30d|ytd
const [scrollPct,setScrollPct]=useState(0);
const [toasts,setToasts]=useState([]);
const [now,setNow]=useState(()=>Date.now()); // tick pour rafraîchir le badge "fresh"
const [,forceRender]=useState(0);

const pushToast=useCallback((toast)=>{
  const id=Date.now()+Math.random();
  setToasts(t=>[...t,{id,tone:"warn",ttl:8000,...toast}]);
  setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),toast.ttl||8000);
},[]);
const dismissToast=useCallback((id)=>setToasts(t=>t.filter(x=>x.id!==id)),[]);

useEffect(()=>{localStorage.setItem("sh_period",period);},[period]);

// Scroll progress
useEffect(()=>{
  const onScroll=()=>{
    const h=document.documentElement;
    const max=h.scrollHeight-h.clientHeight;
    setScrollPct(max>0?Math.min(100,(h.scrollTop||window.scrollY)/max*100):0);
  };
  window.addEventListener("scroll",onScroll,{passive:true});
  onScroll();
  return ()=>window.removeEventListener("scroll",onScroll);
},[]);

// Tick toutes les 30s pour réévaluer la fraîcheur des données
useEffect(()=>{
  const t=setInterval(()=>setNow(Date.now()),30000);
  return ()=>clearInterval(t);
},[]);

// Calcul fraîcheur — fresh < 5 min, stale < 30 min, old au-delà
const freshState=useMemo(()=>{
  if(!lastSync) return {age:"none",label:"Sync"};
  const min=Math.floor((now-lastSync.getTime())/60000);
  let age="fresh";
  if(min>=30) age="old";
  else if(min>=5) age="stale";
  return {age,label:lastSync.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),min};
},[lastSync,now]);

// ─── thème : applique data-theme et écoute le système ─────────────────────
useEffect(()=>{
  const root=document.documentElement;
  if(theme==="auto") root.removeAttribute("data-theme");
  else root.setAttribute("data-theme",theme);
  localStorage.setItem("sh_theme",theme);
  // re-sync palette + force re-render des charts
  requestAnimationFrame(()=>{ syncT(); forceRender(n=>n+1); });
},[theme]);
useEffect(()=>{
  const mq=window.matchMedia("(prefers-color-scheme: dark)");
  const handler=()=>{ syncT(); forceRender(n=>n+1); };
  mq.addEventListener("change",handler);
  return ()=>mq.removeEventListener("change",handler);
},[]);

const syncSheets=useCallback(async()=>{
setSyncing(true); setSyncStatus("sync…");
try{
const res=await fetch(APPS_SCRIPT_URL, {redirect:"follow"});
if(!res.ok) throw new Error(`HTTP ${res.status}`);
const text=await res.text();
const json=JSON.parse(text.trim().replace(/^﻿/,""));
const n={...CA_N_STATIC}, n1={...CA_N1_STATIC};

const apply=(rows, target)=>{ const found=parseSheetRows(rows); Object.assign(target,found); };

if(Array.isArray(json)){
apply(json, n);
} else if(typeof json==="object"){
Object.entries(json).forEach(([key,rows])=>{
if(!Array.isArray(rows)) return;
if(key.includes("26")) apply(rows, n);
});
}

MONTHS.forEach(m=>{ if(n1[m]==null) n1[m]=CA_N1_STATIC[m]; });

if(typeof json==="object"&&!Array.isArray(json)&&Array.isArray(json["CAISSE 26"])){
  const dj=parseDailyCa(json["CAISSE 26"]);
  Object.keys(dj).forEach(function(mm){DJ_N[mm]=dj[mm];});
}
if(typeof json==="object"&&!Array.isArray(json)&&Array.isArray(json["STATS SIMU"])){
  const sd=parseSimuRows(json["STATS SIMU"]);
  if(sd.length>0){SIMU_DATA=sd;}
}
setCaN(n); setCaN1(n1); setLastSync(new Date()); setSyncStatus("ok");
console.log("✅ Sync OK");
}catch(e){
setSyncStatus("erreur");
console.warn("❌ Sync échouée:", e.message);
pushToast({tone:"warn",title:"Sync Google Sheets échouée",msg:e.message+" — données affichées : derniers chiffres connus. Réessaie dans quelques minutes."});
}
setSyncing(false);
},[pushToast]);

useEffect(()=>{ syncSheets(); const t=setInterval(syncSheets,120000); return()=>clearInterval(t); },[]);

useEffect(()=>{
fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=weathercode,temperature_2m_max,precipitation_sum,snowfall_sum,windspeed_10m_max&timezone=Europe%2FParis&forecast_days=5`)
.then(r=>r.json()).then(d=>{const D=d.daily,L=["Auj","Dem","J+2","J+3","J+4"];setWxToday({code:D.weathercode[0],tmax:D.temperature_2m_max[0],rain:D.precipitation_sum[0],snow:D.snowfall_sum[0]||0,wind:Math.round(D.windspeed_10m_max[0])});setWxForecast(D.time.map((_,i)=>({label:L[i],code:D.weathercode[i],tmax:D.temperature_2m_max[i],rain:D.precipitation_sum[i],snow:D.snowfall_sum[i]||0})));}).catch(()=>{});
const t=new Date(); t.setFullYear(t.getFullYear()-1);
fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${LAT}&longitude=${LON}&start_date=${t.toISOString().slice(0,10)}&end_date=${t.toISOString().slice(0,10)}&daily=weathercode,temperature_2m_max,precipitation_sum,snowfall_sum,windspeed_10m_max&timezone=Europe%2FParis`)
.then(r=>r.json()).then(d=>{const D=d.daily;setWxHist({code:D.weathercode[0],tmax:D.temperature_2m_max[0],rain:D.precipitation_sum[0],snow:D.snowfall_sum[0]||0,wind:Math.round(D.windspeed_10m_max[0])});}).catch(()=>{});
},[]);

useEffect(()=>{
const months=[

<path d="M1358.1,295.22l-.93-139.08h-49.31l14.54,79.25c0,21.17-11.46,30.69-26.42,30.69-9.94,0-17.6-4.26-21.48-13.18-.01-.02-.02-.05-.03-.07-.03-.06-.06-.12-.08-.18-2.17-4.25-3.33-9.83-3.33-16.89v-79.81h-31.63v15.51h6v12h6v36.01h-6v12h-6v12h-5.72c.75,11.92,3.26,22.43,7.48,31.05,8.42,15.27,23.21,23.41,42.94,23.41,5.17,0,10.02-.59,14.53-1.74,9.25-2.36,17.05-7.12,23.04-14.19.64-.75,1.26-1.53,1.86-2.33v15.54h34.54Z"/>
</svg>
<div className="sh-sep" style={{width:1,height:20,background:"var(--hairline)",margin:"0 4px"}}/>
<span className="sh-date" style={{fontSize:12,color:"var(--ink-muted)"}}>{dateStr}</span>
</div>
<div className="sh-meta">
<select value={period} onChange={e=>setPeriod(e.target.value)} className="sh-select" style={{fontSize:12,padding:"0.35rem 0.55rem",minHeight:34}} aria-label="Période d'analyse">
<option value="month">Mois en cours</option>
<option value="7d">7 derniers jours</option>
<option value="30d">30 derniers jours</option>
<option value="ytd">YTD</option>
</select>
<div style={{display:"flex",alignItems:"center",gap:8}}>
<span style={{fontSize:11,color:"var(--ink-muted)"}}>Objectif</span>
<span className="sh-num" style={{fontSize:12,fontWeight:600,color:growth>=0?"var(--primary)":"var(--danger)",minWidth:64}}>N-1 {growth>=0?"+":""}{growth}%</span>
<input type="range" min={-20} max={80} step={5} value={growth} onChange={e=>setGrowth(+e.target.value)} style={{width:90}} aria-label="Objectif de croissance"/>
</div>
<button onClick={()=>setBlurred(b=>!b)} className="sh-btn" data-active={blurred?"true":"false"} title={blurred?"Afficher":"Masquer"} aria-label={blurred?"Afficher les données":"Masquer les données"}>
{blurred?<IconEyeOff/>:<IconEye/>}<span>{blurred?"Masqué":"Privé"}</span>
</button>
<button onClick={()=>setTheme(nextTheme)} className="sh-btn" title={`Thème : ${themeLabel}`} aria-label="Changer de thème">
{themeIcon}<span>{themeLabel}</span>
</button>
<button onClick={syncSheets} disabled={syncing} className="sh-btn" data-state={syncStatus==="erreur"?"error":undefined} aria-label={`Rafraîchir les données${lastSync?` (dernière sync il y a ${freshState.min} min)`:""}`} title={lastSync?`Sync il y a ${freshState.min} min`:"Jamais synchronisé"}>
<IconRefresh/>
{syncing?<span className="sh-num">sync…</span>:syncStatus==="erreur"?<span className="sh-num">Erreur</span>:<span className="sh-fresh" data-age={freshState.age}><span className="sh-fresh-dot"/><span className="sh-fresh-time sh-num">{freshState.label}</span></span>}
</button>
</div>
</header>

<nav className="sh-nav" role="tablist" aria-label="Sections du dashboard">
{navItems.map(n=><NavBtn key={n.k} l={n.l} a={vue===n.k} onClick={()=>setVue(n.k)}/>)}
</nav>

<main className="sh-main" style={{filter:blurred?"blur(8px)":"none",transition:"filter 0.3s ease",userSelect:blurred?"none":"auto"}}>
{vue==="jour" && <VueJour wxToday={wxToday} wxForecast={wxForecast} wxHist={wxHist} ca_n={ca_n} ca_n1={ca_n1} growth={growth} wxDaily={wxDaily} period={period}/>}
{vue==="mois" && <VueMois ca_n={ca_n} ca_n1={ca_n1} growth={growth}/>}
{vue==="annee" && <VueAnnee ca_n={ca_n} ca_n1={ca_n1} growth={growth}/>}
{vue==="jours" && <VueJours wxDaily={wxDaily}/>}
{vue==="meteo" && <VueMeteo wxToday={wxToday} wxForecast={wxForecast} wxHist={wxHist} wxDaily={wxDaily}/>}
{vue==="simu" && <VueSimu/>}
{vue==="membership" && <VueMembership/>}
</main>

<footer className="sh-footer">
<span>Swing House Chamonix · Pilotage</span>
<span className="mono">v2.0</span>
</footer>

{toasts.length>0&&<div className="sh-toast-wrap" role="status" aria-live="polite">
{toasts.map(t=>(
<div key={t.id} className="sh-toast" data-tone={t.tone}>
<div className="sh-toast-body">
{t.title&&<div className="sh-toast-title">{t.title}</div>}
{t.msg&&<div className="sh-toast-msg">{t.msg}</div>}
</div>
<button onClick={()=>dismissToast(t.id)} className="sh-toast-close" aria-label="Fermer">×</button>
</div>
))}
</div>}

</div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
